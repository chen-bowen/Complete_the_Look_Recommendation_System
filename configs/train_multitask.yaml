# Multi-task training: CTL + Street2Shop + Polyvore (merged into compatibility)
# Requires: 1) prepare_stl_ctl (--ctl-train --ctl-test), 2) prepare_street2shop, 3) prepare_polyvore (and add images)

batch_size: 64
num_epochs: 5
learning_rate: 0.0001
margin: 1.0
save_dir: "src/models/trained_models"

# Street2Shop (street -> shop retrieval)
use_street2shop: true
street2shop_weight: 0.5
street2shop_batch_size: 32

# Polyvore merged into compatibility
use_polyvore_in_compatibility: true
